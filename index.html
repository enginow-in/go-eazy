    <!-- Mapbox GL CSS + JS loaded from CDN (NOT bundled) to prevent
         "Cannot access X before initialization" TDZ error in Vite/Rolldown
         caused by mapbox-gl's internal circular dependencies in its Web Worker -->
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css' rel='stylesheet' />
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js'></script>
    
    <!-- Console Cleanup & Permissions Policy -->
    <meta http-equiv="Permissions-Policy" content="accelerometer=(self), gyroscope=(self), magnetometer=(self), camera=(), microphone=(), geolocation=(self)">
    <script>
      (function() {
        // Dynamic Tab Title
        let originalTitle = document.title;
        window.addEventListener('blur', () => {
          document.title = 'Don\'t miss the best deals! | GoEazy';
        });
        window.addEventListener('focus', () => {
          document.title = originalTitle;
        });

        const ignoreStrings = [
          '[vite]',
          '[Violation]',
          'non-passive event listener',
          'accelerometer is not allowed',
          'devicemotion events are blocked',
          'deviceorientation events are blocked',
          'unsafe header',
          'x-rtb-fingerprint-id',
          'Permissions policy violation',
          'Forced reflow',
          'Mixed Content',
          'local network request',
          'request-id',
          'accelerometer',
          'sardine',
          'biometric',
          'requestAnimationFrame',
          'message',
          'took',
          'handler',
          'localhost:7070',
          '[DEPRECATED]',
          "Failed to launch 'tel:",
          'preloaded using link preload but not used',
          'Multiple readback operations',
          'delete state for intermediate websites',
          'aria-labelledby',
          'autofilling',
        ];
        const originalWarn = console.warn;
        const originalError = console.error;
        const originalLog = console.log;
        const originalDebug = console.debug;
        const originalInfo = console.info;
        
        const shouldIgnore = (args) => {
          const strArgs = args.map(a => {
            try { return typeof a === 'string' ? a : JSON.stringify(a); }
            catch(e) { return ''; }
          }).join(' ');
          return ignoreStrings.some(s => strArgs.includes(s));
        };

        console.warn = function(...args) {
          if (shouldIgnore(args)) return;
          originalWarn.apply(console, args);
        };
        console.error = function(...args) {
          if (shouldIgnore(args)) return;
          originalError.apply(console, args);
        };
        console.log = function(...args) {
          if (shouldIgnore(args)) return;
          originalLog.apply(console, args);
        };
        console.debug = function(...args) {
          if (shouldIgnore(args)) return;
          originalDebug.apply(console, args);
        };
        console.info = function(...args) {
          if (shouldIgnore(args)) return;
          originalInfo.apply(console, args);
        };

        // Global Security & Anti-Copy Protection (DISABLED FOR DEVELOPMENT)
        /*
        document.addEventListener('contextmenu', e => e.preventDefault());

        document.addEventListener('keydown', function(e) {
          // Block F12 (DevTools)
          if (e.keyCode === 123) {
            e.preventDefault();
            return false;
          }
          // Block Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console), Ctrl+Shift+C (Inspect Element)
          if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
            e.preventDefault();
            return false;
          }
          // Block Ctrl+U (View Source)
          if (e.ctrlKey && e.keyCode === 85) {
            e.preventDefault();
            return false;
          }
          // Block Ctrl+S (Save Page)
          if (e.ctrlKey && e.keyCode === 83) {
            e.preventDefault();
            return false;
          }
        });
        */
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: sans-serif;">

        <p>Please enable JavaScript in your browser to use GoEazy and discover verified housing in Uttarakhand.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
