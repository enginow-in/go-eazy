<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password — GoEazy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10201A; --bg-deep:#0A1712; --paper:#E7E3D6; --pine-line:rgba(231,227,214,0.09);
    --accent:#C24429; --accent-soft:#E3C57B; --muted:#9CA89E;
    --mono:'IBM Plex Mono',monospace; --display:'Space Grotesk',sans-serif; --body:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--paper); font-family:var(--body);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{width:100%; max-width:400px;}
  .logo{font-family:var(--display); font-weight:700; font-size:1.3rem; margin-bottom:36px; display:flex; gap:8px;}
  .logo .peak{color:var(--accent-soft);}
  h2{font-family:var(--display); font-size:1.5rem; font-weight:600; letter-spacing:-0.02em;}
  p.lead{margin-top:8px; font-size:0.9rem; color:var(--muted);}
  form{margin-top:28px; display:flex; flex-direction:column; gap:16px;}
  label{font-family:var(--mono); font-size:0.75rem; color:var(--muted); letter-spacing:0.04em; display:block; margin-bottom:8px;}
  input{
    width:100%; background:var(--bg-deep); border:1px solid var(--pine-line); color:var(--paper);
    padding:13px 14px; font-family:var(--body); font-size:0.95rem; border-radius:2px; outline:none;
  }
  input:focus{border-color:var(--accent-soft);}
  button{
    font-family:var(--mono); font-size:0.88rem; padding:14px 20px; border-radius:2px; border:none;
    cursor:pointer; background:var(--accent); color:var(--paper);
  }
  button:hover{transform:translateY(-2px);}
  button:disabled{opacity:0.6; cursor:default; transform:none;}
  .msg{
    margin-top:20px; font-family:var(--mono); font-size:0.82rem; padding:12px; border-radius:2px; display:none;
  }
  .msg.ok{display:block; background:rgba(58,95,79,0.25); border:1px solid rgba(58,95,79,0.5); color:var(--paper);}
  .msg.err{display:block; background:rgba(194,68,41,0.12); border:1px solid rgba(194,68,41,0.4); color:var(--accent-soft);}
  .back{margin-top:24px; font-size:0.87rem; color:var(--muted); text-align:center;}
  .back a{color:var(--accent-soft);}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Go<span class="peak">▲</span>Eazy</div>
    <h2>Reset your password</h2>
    <p class="lead">Enter the email on your account and we'll send a reset link.</p>
    <form id="form">
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" id="submitBtn">Send reset link</button>
    </form>
    <p class="msg" id="msg"></p>
    <p class="back">Remembered it? <a href="/login">Back to sign in</a></p>
  </div>

<script>
  const form = document.getElementById('form');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.className = 'msg';
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = 'Sending…';

    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim() })
      });
      const data = await res.json();
      if (!res.ok) {
        msg.textContent = data.error || 'Something went wrong.';
        msg.className = 'msg err';
      } else {
        msg.textContent = data.message || 'If that email has an account, a reset link is on its way.';
        msg.className = 'msg ok';
        form.reset();
      }
    } catch {
      msg.textContent = 'Could not reach the server.';
      msg.className = 'msg err';
    } finally {
      btn.disabled = false;
      btn.textContent = original;
    }
  });
</script>
</body>
</html>
